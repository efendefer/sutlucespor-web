<!DOCTYPE html>

<title>Sütlüce Eğitim Spor Kulübü</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#f4f4f4;
color:#222;
}

header{
background:#0057b8;
color:#fff;
text-align:center;
padding:25px;
}

header img{
width:100px;
margin-bottom:10px;
}

.hero img{
width:100%;
height:450px;
object-fit:cover;
display:block;
}

section{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

h2{
color:#0057b8;
margin-bottom:20px;
text-align:center;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

.gallery img{
width:100%;
height:220px;
object-fit:cover;
border-radius:8px;
}

.contact{
background:#fff;
padding:20px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,.1);
text-align:center;
line-height:2;
}

.contact a{
color:#0057b8;
text-decoration:none;
font-weight:bold;
}

footer{
background:#0057b8;
color:#fff;
text-align:center;
padding:15px;
margin-top:40px;
}

@media(max-width:768px){
.hero img{
height:250px;
}
}
</style>
